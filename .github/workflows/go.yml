# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" , "dev" ]
  pull_request:
    branches: [ "main" , "dev" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25.0'
        cache: true

    - name: Lint
      run: make lint

    - name: Build
      run: make build

    - name: Test
      run: make test

    - name: Install migrate
      run: make install-migrate

    - name: Validate migrations
      run: migrate -path db/migrations -database "postgres://user:pass@localhost:5432/test?sslmode=disable" validate
